<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link rel="icon" href="img/logo.ico" type="image/x-icon">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="sync.js" defer></script>
</head>
<body>

<!-- QUICK-ACTION TOPBAR — same component as the Health/Fitness screens. Declared
     statically here; js/topbar.js detects it, skips re-injecting, and still wires
     the water pill + injects the shared CSS and bottom tab bar. The water pill's
     "warn" class and "0/2.4" count are placeholders that topbar.js overwrites
     from live data on boot. -->
<header class="topbar" id="topbar" role="navigation" aria-label="Quick actions">
  <div class="topbar-water-wrap">
    <a href="health.html#water" class="topbar-water-pill warn" id="topbarWater" aria-label="Water progress">
      <span class="topbar-pill-dot"></span>
      <span class="topbar-pill-count" id="topbarWaterCount">0/2.4</span>
    </a>
    <button class="topbar-water-add" id="topbarWaterAdd" aria-label="Log one bottle of water" type="button"><svg class="water-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2h8"/><path d="M9 2v2.789a4 4 0 0 1-.672 2.219l-.656.984A4 4 0 0 0 7 10.212V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-9.789a4 4 0 0 0-.672-2.219l-.656-.984A4 4 0 0 1 15 4.789V2"/><path d="M7 15a6.472 6.472 0 0 1 5 0 6.47 6.47 0 0 0 5 0"/></svg></button>
  </div>
  <a href="wardrobe.html" class="topbar-wardrobe-btn" id="topbarWardrobe" aria-label="Smart Wardrobe">
    <span class="topbar-wardrobe-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg></span>
  </a>
</header>

<!-- Calendar-first AI dashboard. The schedule is the core; the assistant (local
     intent parser + Gemini proxy fallback) reads and mutates it. Padded <main>
     keeps the topbar above flush/full-bleed, as on Health/Fitness. -->
<main class="dash-main">

  <!-- HEADER — greeting + slim ambient day-progress + account avatar -->
  <header class="aios-head">
    <div class="aios-greeting">
      <h1 class="aios-hello" id="aiosHello">Hello</h1>
      <div class="aios-date" id="aiosDate">—</div>
    </div>
    <div class="aios-head-right">
      <div class="aios-dayprog" title="Awake-day progress">
        <div class="aios-dayprog-track"><div class="aios-dayprog-fill" id="aiosDayFill"></div></div>
        <div class="aios-dayprog-label" id="aiosDayLabel">—</div>
      </div>
      <!-- Account & settings trigger. Avatar / initials / gear rendered by
           js/account.js, which also builds the modal on demand. -->
      <button class="aios-acct" id="acctBtn" type="button" aria-haspopup="dialog"
              aria-label="Account and settings">
        <span class="aios-acct-inner" id="acctAvatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </button>
    </div>
  </header>

  <div class="aios-grid">

    <!-- CALENDAR CORE -->
    <section class="card aios-cal" aria-label="Today's schedule">
      <div class="aios-cal-head">
        <div>
          <div class="aios-eyebrow">Schedule</div>
          <div class="aios-cal-date" id="calDateLabel">Today</div>
        </div>
        <div class="aios-cal-meta">
          <span class="cal-count-label" id="calEventCount">Loading…</span>
          <button class="cal-refresh-btn" id="calRefreshBtn" title="Refresh" aria-label="Refresh calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      </div>
      <!-- Google Calendar linking (per-user OAuth). Populated by js/calendar-link.js;
           empty/hidden until the status check resolves. -->
      <div id="calLinkMount"></div>
      <div id="calOfflineMsg" class="cal-offline" style="display:none">
        ⚠ Couldn’t reach your calendar — check your connection.
      </div>
      <ul id="calEventList" class="cal-event-list"></ul>

      <!-- Interactive month-view calendar. Replaces the old manual-add form:
           the chat assistant now owns event creation/mutation, and this grid
           lets you browse any day of the year. Click a day → the schedule list
           above filters to that date. Cells render dynamically in js/index.js;
           a tiny gold dot under a number means that day has blocks planned. -->
      <div class="dashboard-calendar-widget" id="calWidget" aria-label="Month calendar">
        <div class="dcw-head">
          <button class="dcw-nav" id="dcwPrev" type="button" aria-label="Previous month">‹</button>
          <div class="dcw-title" id="dcwTitle">—</div>
          <button class="dcw-nav" id="dcwNext" type="button" aria-label="Next month">›</button>
        </div>
        <div class="dcw-dows" aria-hidden="true">
          <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div class="dcw-grid" id="dcwGrid" role="grid"></div>
      </div>
      <div class="gm-status-line" id="calStatus"></div>
    </section>

    <!-- AI COMMAND ASSISTANT -->
    <section class="card aios-chat" aria-label="AI assistant">
      <!-- Kame House watermark — a minimalist architectural silhouette (island,
           domed house with "KAME HOUSE" on the roofline, two geometric palms)
           resting at the bottom of the chat. Strictly decorative: z-index 0
           (below the z-index:1 content) and pointer-events none. One flat
           desaturated-jade fill at opacity 0.05 reads as a high-end vector
           watermark, not a cartoon. -->
      <div class="kame-bg-overlay" aria-hidden="true">
        <svg viewBox="0 0 400 150" preserveAspectRatio="xMidYMax meet">
          <g class="kame-art">
            <!-- Island: flat sandbar + low mound. -->
            <ellipse cx="200" cy="138" rx="150" ry="10"/>
            <path d="M70,138 C92,116 150,110 200,110 C250,110 308,116 330,138 Z"/>

            <!-- Left geometric palm. -->
            <path d="M108,120 C112,100 106,82 102,68 L98,68 C100,84 104,102 104,120 Z"/>
            <path d="M100,66 L72,58 L78,68 Z"/>
            <path d="M100,66 L74,73 L83,77 Z"/>
            <path d="M100,66 L99,43 L108,57 Z"/>
            <path d="M100,66 L126,52 L120,64 Z"/>
            <path d="M100,66 L128,70 L118,75 Z"/>

            <!-- House: rectangular body + domed roof, round door, port-windows. -->
            <rect x="170" y="80" width="60" height="38" rx="2"/>
            <path d="M162,82 C162,57 238,57 238,82 Z"/>
            <rect x="193" y="98" width="14" height="20" rx="7"/>
            <circle cx="180" cy="93" r="3.6"/>
            <circle cx="220" cy="93" r="3.6"/>
            <!-- "KAME HOUSE" simplified along the roofline. -->
            <text class="kame-label" x="200" y="74" text-anchor="middle">KAME HOUSE</text>

            <!-- Right geometric palm (mirror of the left). -->
            <path d="M296,120 C292,100 298,82 302,68 L306,68 C304,84 300,102 300,120 Z"/>
            <path d="M304,66 L332,58 L326,68 Z"/>
            <path d="M304,66 L330,73 L321,77 Z"/>
            <path d="M304,66 L305,43 L296,57 Z"/>
            <path d="M304,66 L278,52 L284,64 Z"/>
            <path d="M304,66 L276,70 L286,75 Z"/>
          </g>
        </svg>
      </div>
      <div class="aios-chat-head">
        <span class="aios-chat-orb" id="aiOrb" aria-hidden="true">
          <!-- Coiled-dragon emblem — the shenlong.png silhouette used as a CSS
               mask so it inherits the orb's gold aura (currentColor) instead of
               showing as a flat black image. The artwork's own ring frames the
               orb; the gradient bg + pulse glow keep the established style. -->
          <span class="orb-emblem"></span>
        </span>
        <div>
          <div class="aios-chat-title">Shenlong</div>
          <div class="aios-chat-sub" id="aiSub">State your wishes. I shall grant them.</div>
        </div>
      </div>
      <!-- The 7 Dragon Balls — a processing loader. Hidden while idle; fades in
           and spins as an energetic orbit only while Shenlong is granting the
           wish (.is-processing on the chat card). -->
      <div class="dragon-balls-ring" id="shenlongBalls" aria-hidden="true">
        <i class="dball"></i><i class="dball"></i><i class="dball"></i><i class="dball"></i><i class="dball"></i><i class="dball"></i><i class="dball"></i>
      </div>
      <div class="aios-chat-log" id="aiLog" aria-live="polite"></div>
      <div class="aios-chips" id="aiChips"></div>
      <form class="aios-chat-input" id="aiForm" autocomplete="off">
        <input id="aiInput" type="text" placeholder="Ask or command your day…" autocomplete="off"/>
        <button type="submit" id="aiSend" aria-label="Send">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </section>

  </div>

  <!-- QUICK NOTES — the one retained, shrunk-down inbox -->
  <section class="card aios-notes" aria-label="Quick notes">
    <div class="aios-notes-head">
      <span class="aios-eyebrow">Inbox</span>
      <span class="aios-notes-count" id="notesCount"></span>
    </div>
    <ul class="aios-notes-list" id="notesList"></ul>
    <form class="aios-notes-input" id="notesForm" autocomplete="off">
      <input id="notesInput" type="text" placeholder="Jot a quick note…" autocomplete="off"/>
      <button type="submit" aria-label="Add note">+</button>
    </form>
  </section>

</main>

<script src="js/index.js" defer></script>
<script src="js/calendar-link.js" defer></script>
<script src="js/account.js" defer></script>
<script src="js/topbar.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedPrefixes: ['cal_done:', 'cal_manual:', 'quicknotes_v1', 'aptron_profile_v1'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('calendar-synced'));
      window.dispatchEvent(new CustomEvent('notes-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
</body>
</html>
