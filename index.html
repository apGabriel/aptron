<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link rel="icon" href="img/logo.ico" type="image/x-icon">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
</head>
<body>

<!-- QUICK-ACTION TOPBAR — same component as the Health/Fitness screens. Declared
     statically here; js/topbar.js detects it, skips re-injecting, and still wires
     the water pill + injects the shared CSS and bottom tab bar. The water pill's
     "warn" class and "0/2.4" count are placeholders that topbar.js overwrites
     from live data on boot. -->
<header class="topbar" id="topbar" role="navigation" aria-label="Quick actions">
  <div class="topbar-water-wrap">
    <a href="health.html#water" class="topbar-water-pill warn" id="topbarWater" aria-label="Water progress">
      <span class="topbar-pill-dot"></span>
      <span class="topbar-pill-count" id="topbarWaterCount">0/2.4</span>
    </a>
    <button class="topbar-water-add" id="topbarWaterAdd" aria-label="Log one bottle of water" type="button"><svg class="water-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2h8"/><path d="M9 2v2.789a4 4 0 0 1-.672 2.219l-.656.984A4 4 0 0 0 7 10.212V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-9.789a4 4 0 0 0-.672-2.219l-.656-.984A4 4 0 0 1 15 4.789V2"/><path d="M7 15a6.472 6.472 0 0 1 5 0 6.47 6.47 0 0 0 5 0"/></svg></button>
  </div>
  <a href="wardrobe.html" class="topbar-wardrobe-btn" id="topbarWardrobe" aria-label="Smart Wardrobe">
    <span class="topbar-wardrobe-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg></span>
  </a>
</header>

<!-- Calendar-first AI dashboard. The schedule is the core; the assistant (local
     intent parser + Gemini proxy fallback) reads and mutates it. Padded <main>
     keeps the topbar above flush/full-bleed, as on Health/Fitness. -->
<main class="dash-main">

  <!-- HEADER — greeting + slim ambient day-progress -->
  <header class="aios-head">
    <div class="aios-greeting">
      <h1 class="aios-hello" id="aiosHello">Hello</h1>
      <div class="aios-date" id="aiosDate">—</div>
    </div>
    <div class="aios-dayprog" title="Awake-day progress">
      <div class="aios-dayprog-track"><div class="aios-dayprog-fill" id="aiosDayFill"></div></div>
      <div class="aios-dayprog-label" id="aiosDayLabel">—</div>
    </div>
  </header>

  <div class="aios-grid">

    <!-- CALENDAR CORE -->
    <section class="card aios-cal" aria-label="Today's schedule">
      <div class="aios-cal-head">
        <div>
          <div class="aios-eyebrow">Schedule</div>
          <div class="aios-cal-date" id="calDateLabel">Today</div>
        </div>
        <div class="aios-cal-meta">
          <span class="cal-count-label" id="calEventCount">Loading…</span>
          <button class="cal-refresh-btn" id="calRefreshBtn" title="Refresh" aria-label="Refresh calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      </div>
      <div id="calOfflineMsg" class="cal-offline" style="display:none">
        ⚠ Proxy offline — run <code>npm start</code> in the proxy folder to show events.
      </div>
      <ul id="calEventList" class="cal-event-list"></ul>
      <div class="gm-input-wrap cal-add-wrap">
        <div class="cal-fields-row">
          <input class="gm-input cal-title-input" id="calTaskInput" type="text" placeholder="Schedule a block…" autocomplete="off"/>
          <input class="cal-desc-input" id="calDescInput" type="text" placeholder="Description (optional)…" autocomplete="off"/>
        </div>
        <div class="cal-controls-wrapper">
          <input class="cal-time-input" id="calTimeInput" type="time" value="09:00"/>
          <input class="cal-dur-input" id="calDurInput" type="number" value="15" min="1" max="1440" title="Duration in minutes"/>
          <span class="cal-dur-label">min</span>
          <button class="gm-add-btn" id="calAddBtn">+ Schedule</button>
        </div>
      </div>
      <div class="gm-status-line" id="calStatus"></div>
    </section>

    <!-- AI COMMAND ASSISTANT -->
    <section class="card aios-chat" aria-label="AI assistant">
      <div class="aios-chat-head">
        <span class="aios-chat-orb" id="aiOrb" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.13-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.13a.5.5 0 0 1 .96 0l1.58 6.13A2 2 0 0 0 15.5 9.94l6.13 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.13a.5.5 0 0 1-.96 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/></svg>
        </span>
        <div>
          <div class="aios-chat-title">Assistant</div>
          <div class="aios-chat-sub" id="aiSub">Your day, orchestrated</div>
        </div>
      </div>
      <div class="aios-chat-log" id="aiLog" aria-live="polite"></div>
      <div class="aios-chips" id="aiChips"></div>
      <form class="aios-chat-input" id="aiForm" autocomplete="off">
        <input id="aiInput" type="text" placeholder="Ask or command your day…" autocomplete="off"/>
        <button type="submit" id="aiSend" aria-label="Send">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </section>

  </div>

  <!-- QUICK NOTES — the one retained, shrunk-down inbox -->
  <section class="card aios-notes" aria-label="Quick notes">
    <div class="aios-notes-head">
      <span class="aios-eyebrow">Inbox</span>
      <span class="aios-notes-count" id="notesCount"></span>
    </div>
    <ul class="aios-notes-list" id="notesList"></ul>
    <form class="aios-notes-input" id="notesForm" autocomplete="off">
      <input id="notesInput" type="text" placeholder="Jot a quick note…" autocomplete="off"/>
      <button type="submit" aria-label="Add note">+</button>
    </form>
  </section>

</main>

<script src="js/index.js" defer></script>
<script src="js/topbar.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedPrefixes: ['cal_done:', 'cal_manual:', 'quicknotes_v1'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('calendar-synced'));
      window.dispatchEvent(new CustomEvent('notes-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
</body>
</html>
